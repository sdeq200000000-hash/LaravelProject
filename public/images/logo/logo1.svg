<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 58">
  <!-- Red accent bar -->
  <rect x="0" y="5" width="6" height="48" fill="#c8102e" rx="3"/>

  <!-- Shoe silhouette icon -->
  <g transform="translate(14, 4)">
    <!-- sole -->
    <ellipse cx="20" cy="48" rx="20" ry="5.5" fill="#111111"/>
    <!-- midsole -->
    <ellipse cx="20" cy="43" rx="18" ry="4" fill="#f0f0f0"/>
    <!-- upper body red -->
    <path d="M4 40 Q7 22 18 15 Q26 11 36 18 L42 30 L42 40 Z" fill="#c8102e"/>
    <!-- white panel -->
    <path d="M10 28 Q20 18 32 22 L42 32 L42 40 L10 40 Z" fill="#ffffff"/>
    <!-- toe box -->
    <ellipse cx="9" cy="36" rx="9" ry="5" fill="#e8e8e8"/>
    <!-- laces -->
    <line x1="16" y1="19" x2="36" y2="17" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="24" x2="35" y2="22" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="29" x2="34" y2="27" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- KICK text -->
  <text x="70" y="36" font-family="Arial Black, Impact, sans-serif" font-size="26" font-weight="900" fill="#111111" letter-spacing="1">KICK</text>
  <!-- VAULT text in red -->
  <text x="70" y="53" font-family="Arial Black, Impact, sans-serif" font-size="18" font-weight="900" fill="#c8102e" letter-spacing="3.5">VAULT</text>
  <!-- 23 superscript -->
  <text x="214" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="900" fill="#c8102e">23</text>
</svg>
